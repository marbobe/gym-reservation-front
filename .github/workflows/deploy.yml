name: Deploy Frontend a Azure

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar por SSH y Desplegar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/gym-reservation-front
            git pull origin main
            npm install
            npm run build
            sudo rm -rf /var/www/gym-reservation-front/*
            sudo cp -r dist/* /var/www/gym-reservation-front/
